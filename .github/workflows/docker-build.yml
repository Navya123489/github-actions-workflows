# docker-build.yml
# Builds and tests a Docker image on every push
# Verifies the image builds correctly before deployment

name: Docker Build and Test

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'Dockerfile'
      - '**.py'
      - '**.js'
  pull_request:
    branches:
      - main

  workflow_dispatch:

jobs:
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest

    steps:
      # Step 1 — Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2 — Set up Docker Buildx for advanced builds
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Step 3 — Build the Docker image
      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false           # Don't push — just build and test
          tags: myapp:${{ github.sha }}
          cache-from: type=gha  # Use GitHub Actions cache
          cache-to: type=gha,mode=max

      # Step 4 — Run the container and test it
      - name: Test Docker image
        run: |
          docker run -d \
            --name testcontainer \
            -p 8080:8080 \
            -e ENVIRONMENT=test \
            myapp:${{ github.sha }}
          
          # Wait for container to start
          sleep 5
          
          # Check container is running
          docker ps | grep testcontainer
          
          echo "Container started successfully"

      # Step 5 — Print image details
      - name: Image summary
        run: |
          echo "================================================="
          echo "Docker build completed successfully"
          echo "Image: myapp:${{ github.sha }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Built by: ${{ github.actor }}"
          echo "================================================="
          docker images myapp